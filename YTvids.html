<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdedSVR | Recent Videos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
    body {
      font-family: 'Heebo', sans-serif;
      background: radial-gradient(circle at 15% 5%, rgba(6, 182, 212, 0.2) 0%, transparent 30%), radial-gradient(circle at 85% 10%, rgba(168, 85, 247, 0.2) 0%, transparent 30%), radial-gradient(circle at 10% 90%, rgba(30, 64, 175, 0.5) 0%, transparent 35%), radial-gradient(circle at 90% 90%, rgba(21, 128, 61, 0.4) 0%, transparent 35%), #0f172a;
      color: white; min-height: 100vh; margin: 0; position: relative; overflow-x: hidden;
    }
    #spotlight { position: fixed; top: 0; left: 0; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 5; display: none; }
    .video-row {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      /* Removed width: 100%; as grid will handle it. */
      display: flex;
      align-items: center;
      text-align: right;
      position: relative;
      z-index: 10;
      padding: 0.75rem; /* Further decreased padding */
      height: 100%; /* Ensure it fills the grid cell vertically */
    }
    .video-row:hover {
      background: rgba(30, 41, 59, 0.85);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    #profile-image { border: 2px solid rgba(255,255,255,0.1); transition: all 0.4s ease; }
    #profile-image:hover { transform: scale(1.05) rotate(1deg); border-color: #3b82f6; box-shadow: 0 0 35px rgba(59, 130, 246, 0.4); }
    #splash-screen { position: fixed; inset: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s ease-out; }
    .splash-logo { max-width: 130px; border-radius: 50%; animation: logoFade 1.2s infinite ease-in-out; }
    @keyframes logoFade { 0%, 100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
    #main-page-content { opacity: 0; visibility: hidden; transition: opacity 0.6s ease-in; }
    #main-page-content.visible { opacity: 1; visibility: visible; }
  </style>
</head>
<body>
  <div id="spotlight"></div>
  <div id="splash-screen"><img src="https://github.com/OdedSVR/images/blob/main/odedsvrlivelogo.jpg?raw=true" alt="Logo" class="splash-logo"></div>
  <div id="main-page-content" class="flex flex-col items-center py-12 px-6" style="max-width: 1080px; min-height: 1080px; margin: 0 auto; box-sizing: border-box;">
    <nav class="w-full max-w-2xl bg-blue-900/30 backdrop-filter backdrop-blur-lg rounded-full p-2 mb-8 flex justify-center mx-auto z-20">
          <a href="https://odedsvr.github.io/links/" class="flex-1 py-2 text-lg font-bold text-white hover:text-blue-300 transition duration-300 text-center">Home</a>
          <a href="https://odedsvr.github.io/links/YTvids" class="flex-1 py-2 text-lg font-bold text-white hover:text-blue-300 transition duration-300 text-center">Recent YT Videos</a>
    </nav>
    <div class="text-center mb-10 relative z-10">
      <img src="https://github.com/OdedSVR/images/blob/main/odedsvrlivelogo.jpg?raw=true" id="profile-image" class="w-32 h-32 rounded-full mx-auto shadow-2xl mb-4 object-cover">
      <h1 class="text-4xl font-black text-white tracking-tight">Recent YouTube Videos</h1>
      <p class="text-[10px] text-blue-400 font-bold tracking-[0.4em] uppercase mt-1">הסרטונים האחרונים בערוץ</p>
    </div>

    <div id="video-container" class="w-full grid grid-cols-1 md:grid-cols-3 gap-6" style="flex-grow: 1; display: grid; grid-template-rows: repeat(3, minmax(0, 1fr)); padding-bottom: 20px;">
        <p class="text-white/30 animate-pulse col-span-full text-center">טוען סרטונים...</p>
    </div>

    <footer class="mt-auto text-[10px] text-white/20 font-bold text-center tracking-[0.2em] uppercase">© 2026 ODEDSVR | CREATED BY PIKER_R</footer>
  </div>

  <script>
    const spotlight = document.getElementById('spotlight');
    const mainContent = document.getElementById('main-page-content');
    const splash = document.getElementById('splash-screen');
    const videoContainer = document.getElementById('video-container');

    // --- הגדרות ה-API ---
    // כאן אתה חייב להדביק את המפתח שקיבלת מגוגל!
    const API_KEY = 'AIzaSyBuIm8oqjwNoqoNDlq9SG9Iz6IlBBdZsqI';
    const CHANNEL_ID = 'UCufkmjBPLurietiKoj9cG3w';

    async function fetchVideos() {
        // המרת מזהה ערוץ למזהה פלייליסט העלאות
        const uploadsPlaylistId = CHANNEL_ID.replace('UC', 'UU');
        const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=9&playlistId=${uploadsPlaylistId}&key=${API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.items && data.items.length > 0) {
                // מנקה את הודעת הטעינה
                videoContainer.innerHTML = '';

                data.items.forEach(item => {
                    const videoId = item.snippet.resourceId.videoId;
                    const title = item.snippet.title;
                    const thumbnail = item.snippet.thumbnails.high.url;

                    const videoRow = `
                        <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" class="video-row rounded-xl">
                            <img src="${thumbnail}" class="w-28 h-16 object-cover rounded-lg ml-6"> <!-- Decreased image size -->
                            <div class="flex-1 text-base font-bold text-white hover:text-blue-400 transition-colors text-right">${title}</div> <!-- Increased text size -->
                        </a>
                    `;
                    videoContainer.innerHTML += videoRow;
                });
            } else {
                videoContainer.innerHTML = '<p class="text-white/50 col-span-full text-center">לא נמצאו סרטונים.</p>';
            }
        } catch (error) {
            console.error("API Error:", error);
            videoContainer.innerHTML = '<p class="text-red-400/50 col-span-full text-center">שגיאה בחיבור ליוטיוב.</p>';
        }
    }

    function activateSite() {
        if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                mainContent.classList.add('visible');
                if (spotlight) spotlight.style.display = 'block';
            }, 500);
        }
    }

    document.addEventListener('mousemove', (e) => {
      if (spotlight) { spotlight.style.left = e.clientX + 'px'; spotlight.style.top = e.clientY + 'px'; }
    });

    // הפעלה ברגע שהדף נטען
    window.addEventListener('load', () => {
        activateSite();
        fetchVideos();
    });

    setTimeout(activateSite, 1000);
  </script>
</body>
</html>
